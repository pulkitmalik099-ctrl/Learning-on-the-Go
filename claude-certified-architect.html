  <script>
  var DECK_ID = 'claude-certified-architect';
  var CARDS = [
    /* ── D1: Agentic Architecture & Orchestration ── */
    { domain:'D1', q:'What are the two key stop_reason values in an agentic loop, and what does each mean?', a:'"tool_use" — the model wants to call a tool; execute it and return the result to continue the loop.\n"end_turn" — the model has finished; terminate the loop.\nMissing this distinction causes loops that never exit or exit prematurely.' },
    { domain:'D1', q:'What is the hub-and-spoke architecture in multi-agent systems?', a:'A coordinator (hub) decomposes tasks, delegates to specialised subagents (spokes), aggregates results, and routes all inter-agent communication. Subagents do not talk to each other directly — only through the coordinator. This reduces coupling and simplifies error handling.' },
    { domain:'D1', q:'What must be explicitly provided when spawning a subagent?', a:'The complete context the subagent needs — its goals, relevant findings, constraints, and any required data. Subagents have isolated context windows and inherit nothing from the parent automatically. Under-briefed subagents produce irrelevant or redundant work.' },
    { domain:'D1', q:'What is the difference between programmatic enforcement and prompt-based guidance?', a:'Programmatic enforcement: deterministic code-level controls that block or transform behaviour regardless of model output (hooks, filters, validators).\nPrompt-based guidance: probabilistic — the model may or may not comply.\nUse programmatic enforcement when guaranteed compliance is required (PII scrubbing, scope limits).' },
    { domain:'D1', q:'What does a PostToolUse hook do in the Agent SDK?', a:'Intercepts tool results after execution, before the model sees them. Allows: transforming/normalising output, stripping PII, enforcing schema compliance, or injecting metadata. Keeps tool-result handling deterministic without depending on model behaviour.' },
    { domain:'D1', q:'How do you resume a named session in Claude Code, and when should you prefer a fresh start?', a:'Resume: --resume <session-name>. Prefer a fresh start when: the prior session has stale intermediate results, the conversation grew long with confusing context, or the task changed significantly. Start clean and inject a concise summary rather than resuming stale context.' },
    { domain:'D1', q:'What is fork_session used for in Claude Code?', a:'Creating independent branches from a shared session baseline — useful for exploring divergent implementation approaches in parallel (e.g. trying two different refactoring strategies) without one branch affecting the other.' },
    { domain:'D1', q:'What anti-pattern do arbitrary iteration caps create in agentic loops?', a:'Premature termination before task completion. The correct exit condition is stop_reason === "end_turn" or a semantic completion check (e.g. goal achieved). Hard caps are acceptable only as safety rails against infinite loops, not as primary exit conditions.' },
    { domain:'D1', q:'What information must a structured handoff include when escalating from an agent to a human?', a:'① Current state of the task ② Steps already attempted ③ What information is missing or ambiguous ④ Specific decision needed from the human. Without this, the human cannot efficiently resume and must start over or interrogate the agent for context.' },
    { domain:'D1', q:'What is the difference between model-driven dynamic decomposition and a pre-configured sequential pipeline?', a:'Dynamic decomposition: the coordinator uses the model to analyse the task and determine subtasks adaptively — better for open-ended workloads. Sequential pipeline: fixed order of steps known at design time — simpler and predictable but rigid. Use dynamic for exploratory agents; pipeline for repeatable, well-understood processes.' },
    { domain:'D1', q:'How should parallel subagents return results to a coordinator?', a:'Via the tool result mechanism — each subagent\'s output is returned as a structured tool result to the coordinator. The coordinator processes all results before producing its final response. Avoid having subagents write to shared mutable state simultaneously.' },
    { domain:'D1', q:'What is the Task tool used for in multi-agent Claude Code architectures?', a:'Spawning subagents to execute focused, bounded work in parallel — e.g. analysing different files or running independent research tasks. Results from all Task calls are available to the coordinator when they complete, enabling parallelism without complex concurrency management.' },
    { domain:'D1', q:'When does spawning a subagent add overhead without benefit?', a:'When the task is small enough to complete in a single model call; when the coordinator would spend more effort briefing/aggregating than the subagent saves; when the task requires tight context continuity that breaks across isolated subagent contexts.' },
    { domain:'D1', q:'How should a coordinator agent handle a subagent that returns partial results?', a:'Treat partial results as a structured error — log what was obtained, identify what is missing, decide whether to retry with a more targeted subagent, fall back to a simpler approach, or escalate. Never silently forward incomplete results as if complete.' },
    { domain:'D1', q:'What is the primary reliability risk of deeply nested agent hierarchies?', a:'Error propagation — a failure deep in the hierarchy may not surface meaningful context to the top-level coordinator, making recovery impossible. Also: exponential token cost, latency, and coordination complexity. Prefer flat or shallow hierarchies with explicit error contracts at each layer.' },
    { domain:'D1', q:'What constitutes a "minimal agentic footprint" in enterprise deployments?', a:'Agents request only the permissions needed for the current task, avoid storing sensitive data beyond immediate use, prefer reversible actions over irreversible ones, and confirm before taking actions with broad impact. Reduces blast radius of failures and simplifies audit.' },
    { domain:'D1', q:'How does the Agent SDK\'s tool call result differ from raw LLM output?', a:'The SDK processes stop_reason and extracts the structured tool_use block (name + input) from the LLM response. Raw output is an unprocessed content array; the SDK surfaces the tool call as a structured object ready for routing and execution, abstracting parsing from application logic.' },
    { domain:'D1', q:'What determines whether a multi-step task should be handled by one agent vs split across subagents?', a:'Split when: subtasks are genuinely independent (parallelisable), require different specialised tool access, or would overflow one agent\'s context. Keep as one agent when: steps depend tightly on each other, shared context is essential, or the overhead of briefing subagents exceeds the benefit.' },

    /* ── D2: Tool Design & MCP Integration ── */
    { domain:'D2', q:'What is the primary mechanism for LLM tool selection, and what makes it fail?', a:'Tool descriptions are the primary signal — the model reads them to decide which tool fits the request. Failures occur when descriptions are too minimal, too similar to sibling tools, missing input format examples, or lacking edge-case guidance. Fix: rich descriptions with example queries, explicit boundaries, and clear contrasts between similar tools.' },
    { domain:'D2', q:'What does the MCP isError flag communicate, and why structure error responses?', a:'isError: true signals a tool failure to the agent loop. Without structured detail the agent cannot distinguish retryable network errors from permanent access failures. Structure: errorCategory, isRetryable boolean, description, suggestedAlternative — lets the coordinator make an informed recovery decision.' },
    { domain:'D2', q:'What is the scoped tool access principle?', a:'Each agent or subagent should only have access to the tools relevant to its role. Giving an agent 18 tools when it needs 4 degrades selection accuracy. Create agent-role-specific toolsets rather than exposing a global registry to every agent.' },
    { domain:'D2', q:'What is the difference between project-level and user-level MCP server scoping?', a:'Project-level (.mcp.json in repo root): version-controlled, shared with all team members on that project.\nUser-level (~/.claude.json): personal/experimental, applies across all projects for that user only, not shared.\nUse project-level for team infrastructure; user-level for personal dev tools.' },
    { domain:'D2', q:'What is the difference between the Grep and Glob built-in tools in Claude Code?', a:'Grep: searches file CONTENTS for text/regex patterns — use to find where a symbol is defined or used.\nGlob: matches FILE PATHS by name or extension pattern — use to find files by name.\nCommon pattern: Glob to identify candidate files → Grep to confirm content match.' },
    { domain:'D2', q:'When should you use Read + Write instead of Edit in Claude Code?', a:'When Edit cannot find a unique anchor text match (the target string appears multiple times or the file has been heavily modified). Read the full file, modify in memory, then Write the complete updated version back. Slower but guaranteed correct.' },
    { domain:'D2', q:'How many tools can a model reliably differentiate before selection accuracy degrades?', a:'Roughly 4–6 tools per agent. Beyond ~10–15 tools with similar descriptions, misrouting probability increases significantly. Mitigation: group related tools by agent role, use semantically distinct descriptions, or add a tool-routing layer before the primary agent.' },
    { domain:'D2', q:'What is the difference between retryable and non-retryable MCP errors?', a:'Retryable: transient failures — network timeout, rate limit, temporary unavailability. Retry after a delay.\nNon-retryable: permanent failures — invalid credentials, resource not found, permission denied. Retrying wastes tokens and time.\nisRetryable boolean in the error response communicates this distinction.' },
    { domain:'D2', q:'What four elements should a structured MCP error response include?', a:'① errorCategory (e.g. "PERMISSION_DENIED", "NOT_FOUND") ② isRetryable boolean ③ Human-readable description of what failed ④ suggestedAlternative — what the agent should try instead. Enables the coordinator to make an informed recovery decision rather than failing generically.' },
    { domain:'D2', q:'What does tool_choice: "any" enforce vs tool_choice: "auto"?', a:'"any": forces the model to call at least one tool — guarantees structured output via a tool call even if the model would otherwise generate prose. "auto": model decides whether to use a tool or respond directly. Use "any" to ensure JSON schema compliance when structured output is required.' },
    { domain:'D2', q:'Why do overlapping tool descriptions cause misrouting?', a:'The model selects based on semantic similarity between the user query and tool descriptions. When two tools have similar descriptions, the model cannot reliably distinguish them. Fix: explicitly contrast the tools ("Use THIS for X; use THAT for Y") to create clear decision boundaries.' },
    { domain:'D2', q:'What should credentials in MCP .mcp.json files never contain, and where should they go?', a:'Never hardcode API keys, tokens, or passwords in .mcp.json (version-controlled, visible to team). Reference via env key pointing to an environment variable name. Store actual values in .env (gitignored) or CI/CD secrets.' },
    { domain:'D2', q:'What are MCP resources used for, and how do they differ from MCP tools?', a:'Resources: expose read-only data/content (documents, schemas, knowledge base articles) the model can reference — passive retrieval.\nTools: executable functions that take action or query dynamic data — active invocation.\nResources reduce prompt stuffing; tools enable real-time lookup.' },
    { domain:'D2', q:'How should tool descriptions handle edge cases?', a:'Explicitly enumerate what the tool does NOT handle or when NOT to use it. Example: "Use this for internal employee databases only. For customer records, use the CRM tool instead." Clear exclusions are as important as inclusions — they prevent the model from misusing a tool on cases it cannot handle.' },
    { domain:'D2', q:'What is the "description-drift" problem in tool registries?', a:'Over time, tool implementations change but descriptions are not updated, causing the model to expect behaviour the tool no longer provides (or vice versa). Fix: treat tool descriptions as part of the API contract — update them in the same PR as implementation changes and test tool selection after updates.' },

    /* ── D3: Claude Code Configuration & Workflows ── */
    { domain:'D3', q:'What is the CLAUDE.md configuration hierarchy?', a:'① User-level (~/.claude/CLAUDE.md): applies globally, personal, NOT version-controlled.\n② Project-level (root CLAUDE.md): applies to the whole project, shared via git.\n③ Directory-level CLAUDE.md: applies only within that directory.\nLower levels override higher ones. Files listed in settings.json ignore list are excluded from context.' },
    { domain:'D3', q:'What is the difference between project-scoped and user-scoped slash commands?', a:'Project-scoped (.claude/commands/): stored in the repo, version-controlled, shared with all team members.\nUser-scoped (~/.claude/commands/): personal, apply across all projects for that user only.\nUse project-scoped for team conventions; user-scoped for personal productivity shortcuts.' },
    { domain:'D3', q:'What does context: fork frontmatter do in a Claude Code skill?', a:'Runs the skill in an isolated sub-context (forked session) — the verbose output of the skill does not pollute the main agent\'s context window. Useful for research or exploration skills that produce lots of intermediate output you don\'t want degrading the main session\'s focus.' },
    { domain:'D3', q:'When should you use Plan Mode vs direct execution in Claude Code?', a:'Plan Mode: large-scale architectural changes, multi-file refactors, ambiguous requirements, or when multiple approaches need evaluation before committing.\nDirect execution: well-scoped single-file changes, clear requirements, simple bug fixes.\nDefaulting to Plan Mode for large tasks prevents costly mis-starts.' },
    { domain:'D3', q:'What does the -p (--print) flag do when running Claude Code in CI/CD?', a:'Enables non-interactive (print) mode — Claude completes the task and exits without prompting for user input. Required in automated pipelines (GitHub Actions, Jenkins) where interactive prompts would cause the job to hang indefinitely. Output goes to stdout for capture.' },
    { domain:'D3', q:'What is the interview pattern in iterative Claude Code refinement?', a:'Instructing Claude to ask clarifying questions before implementing. Surfaces hidden requirements, design ambiguities, and constraint conflicts upfront — reducing the number of revision cycles. Most valuable for open-ended tasks where requirements are incomplete or contradictory.' },
    { domain:'D3', q:'What does @import syntax do in CLAUDE.md?', a:'Includes the content of another file into CLAUDE.md at that location — allows splitting configuration into domain-specific files (e.g. @import ./rules/api.md, @import ./rules/testing.md). Keeps individual rule files focused and independently maintainable.' },
    { domain:'D3', q:'What is the .claude/rules/ directory used for?', a:'Storing modular, path-specific rule files that can be imported into CLAUDE.md or applied selectively. Allows different rules for different subdirectories (e.g. stricter rules for src/core/ vs looser rules for scripts/). Imported via @import in CLAUDE.md.' },
    { domain:'D3', q:'What does the allowed-tools frontmatter field do in a skill file?', a:'Restricts which tools the skill is permitted to use. A read-only analysis skill can specify allowed-tools: [Read, Grep, Glob] to prevent accidental writes. Acts as a scoped permission boundary for that specific skill context.' },
    { domain:'D3', q:'How should path-specific rules be scoped in large monorepos?', a:'Place a CLAUDE.md in each subdirectory that needs distinct rules (e.g. packages/api/CLAUDE.md, packages/web/CLAUDE.md). Directory-level rules apply only when Claude is working in that directory. Use @import in the root CLAUDE.md for shared cross-project rules.' },
    { domain:'D3', q:'What does --output-format json do in the Claude Code CLI?', a:'Emits Claude\'s response as structured JSON to stdout instead of plain text — enables downstream parsing in scripts or CI pipelines. Combined with -p (non-interactive mode) for fully automated workflows that need to inspect or route Claude\'s output programmatically.' },
    { domain:'D3', q:'What is the Explore subagent used for, vs direct Glob/Grep calls?', a:'Explore is for open-ended codebase research that may require multiple search rounds ("where is X handled?", "which files reference Y?"). Direct Glob/Grep for targeted, known-location lookups. Explore protects the main context window from excessive search result noise.' },
    { domain:'D3', q:'How does CLAUDE.md improve reliability in CI/CD pipelines?', a:'Codifies project conventions (test commands, lint requirements, commit format, forbidden patterns) so Claude applies them consistently in every automated run without prompt repetition. Especially important for non-interactive runs where there is no opportunity to correct Claude mid-task.' },
    { domain:'D3', q:'What makes a slash command "reusable" vs one-shot?', a:'Reusable commands are parameterised (use the $ARGUMENTS placeholder), context-agnostic, and produce consistent quality regardless of current directory state. One-shot commands are hardcoded to specific file paths or tasks. Prefer reusable commands for team-shared workflows.' },
    { domain:'D3', q:'When is it appropriate to use --dangerously-skip-permissions in Claude Code?', a:'Only in fully isolated environments (sandboxed containers, ephemeral CI environments) where the filesystem and network are disposable. Never on development machines or shared systems. Skips all tool-use approval prompts — drastically increases blast radius of errors.' },

    /* ── D4: Prompt Engineering & Structured Output ── */
    { domain:'D4', q:'Why are explicit criteria superior to vague instructions in prompt engineering?', a:'Vague instructions ("be conservative", "be accurate") cannot be operationalised consistently — the model interprets them differently each request. Explicit criteria define exact conditions: "flag only when the behaviour directly contradicts the code comments" — reducing false positives and enabling consistent validation.' },
    { domain:'D4', q:'What is the role of few-shot examples beyond format demonstration?', a:'Few-shot examples calibrate handling of ambiguous cases — the model generalises from how you handled edge cases in examples to novel edge cases. They communicate implicit judgment calls (borderline cases, priority trade-offs) that are hard to express explicitly in instructions alone.' },
    { domain:'D4', q:'What is the most reliable method for guaranteed schema-compliant structured output?', a:'Tool use with JSON schema as input_schema combined with tool_choice: "any" to force invocation. This eliminates JSON syntax errors (malformed braces, missing commas) because the model fills schema fields rather than generating raw JSON strings. Semantic errors still require post-extraction validation.' },
    { domain:'D4', q:'What is the retry-with-error-feedback pattern?', a:'On validation failure, send a follow-up message containing: ① the original source ② the failed extraction output ③ specific validation errors identified. Gives the model precise information needed to correct its output. Note: retries fail if the required information is simply absent from the source.' },
    { domain:'D4', q:'What is the Message Batches API best suited for, and what are its constraints?', a:'Best for: non-blocking, latency-tolerant bulk processing — overnight reports, weekly audits, bulk classification.\nConstraints: up to 24h processing time, no multi-turn tool calls within a single request, not suitable for user-facing blocking workflows.\nOffers ~50% cost savings vs synchronous API.' },
    { domain:'D4', q:'Why is independent review more effective than self-review for catching subtle bugs?', a:'The generating model retains its own reasoning biases and is less likely to question its own decisions — it "knows" what it intended and fills gaps mentally. An independent Claude instance reviews without that prior context, making it more likely to spot logical errors, missing edge cases, and unintended behaviour.' },
    { domain:'D4', q:'What is the difference between semantic errors and schema syntax errors in structured output?', a:'Schema syntax errors: malformed JSON — missing brackets, type mismatches, required fields absent. Caught by JSON parsers.\nSemantic errors: syntactically valid JSON with wrong values — wrong dates, fabricated names, misclassified categories. Require domain-specific business-rule validation, not just schema validation.' },
    { domain:'D4', q:'What does a detected_pattern field in a validation output schema provide?', a:'A categorisation of WHY extraction failed, enabling automated routing — e.g. "MISSING_DATE", "CONFLICTING_VALUES", "AMBIGUOUS_ENTITY". Allows downstream systems to route different error types to different handlers (retry, manual review, data enrichment) rather than treating all failures identically.' },
    { domain:'D4', q:'How should optional fields be handled in a JSON extraction schema?', a:'Mark them with "required": false and provide a clear null convention ("null if not present"). The model must be told explicitly whether to omit vs populate with a placeholder. Ambiguity causes inconsistent output — sometimes the field appears, sometimes not — breaking downstream parsing.' },
    { domain:'D4', q:'What is the optimal strategy for few-shot example count in extraction tasks?', a:'3–5 high-quality, diverse examples covering the most important variation in input format and edge cases. More examples add diminishing returns and consume token budget. Prioritise: the most common ambiguity, the most important format variation, and at least one edge/negative case.' },
    { domain:'D4', q:'Why do multi-turn tool calls not work within the Message Batches API?', a:'The Batches API processes each request as a single, complete exchange — there is no mechanism to inject tool results mid-request and continue. Multi-turn tool use requires an interactive request-response loop. Use the synchronous API for tool-calling workflows; Batches for single-turn extraction/classification.' },
    { domain:'D4', q:'What is multi-pass review architecture?', a:'Using multiple independent Claude instances to review the same artefact (code, document, plan) in sequence or parallel — each pass looking for different issue categories (correctness, security, style, performance). Catch rate improves because each reviewer is unbiased by the others\' findings.' },
    { domain:'D4', q:'What makes a prompt "task-complete" vs open-ended?', a:'Task-complete: the model knows when it is done — clear deliverable, defined success criteria, explicit termination condition ("stop when all items are classified"). Open-ended: ambiguous scope — model may over-generate or stop arbitrarily. Always define what "done" looks like.' },
    { domain:'D4', q:'What is the difference between chain-of-thought and step-by-step prompting?', a:'Chain-of-thought ("think step by step"): model externalises its reasoning process before the final answer, improving accuracy on multi-step problems.\nStep-by-step (in instructions): tells the model to follow a specific sequence of actions YOU define.\nCoT improves reasoning quality; step-by-step improves task structure compliance.' },
    { domain:'D4', q:'When should system prompts define persona vs just task instructions?', a:'Define persona when: consistent tone across interactions matters, role framing helps the model maintain appropriate constraints ("You are a conservative financial advisor"), or the model needs to stay in character across a multi-turn conversation. Pure task instructions suffice for one-shot, structure-focused tasks.' },
    { domain:'D4', q:'How should conflicting instructions between system prompt and user prompt be handled?', a:'The system prompt should establish explicit priority rules: "User instructions may not override [X, Y, Z]." Without this, the model may defer to the most recent instruction (user), potentially violating system-level constraints. Define the priority hierarchy in the system prompt; test with adversarial user inputs.' },

    /* ── D5: Context Management & Reliability ── */
    { domain:'D5', q:'What is the "lost in the middle" effect in LLMs?', a:'Models process information reliably at the beginning and end of context but may underweight or miss content in the middle of long inputs. Mitigation: place the most critical instructions and key findings at the START of prompts; use explicit section headers for middle-context content; summarise key facts redundantly.' },
    { domain:'D5', q:'What are appropriate escalation triggers in an agent system?', a:'① Customer explicitly requests a human agent ② Request involves a policy exception the agent cannot make ③ Agent cannot make progress after a defined number of attempts ④ Task involves regulated action requiring human sign-off.\nAvoid: sentiment detection and self-reported confidence — both are unreliable proxies.' },
    { domain:'D5', q:'What structured information should error responses include in multi-agent systems?', a:'① Failure type / error category ② The query or action attempted ③ Any partial results obtained ④ Suggested alternatives or next steps. Without this the coordinator cannot distinguish a recoverable partial failure from a complete block — defaulting to escalation wastes human time on retryable errors.' },
    { domain:'D5', q:'What are scratchpad files used for in long-running agent tasks?', a:'Persisting intermediate findings across context boundaries — the agent writes key discoveries, decisions, and state to a scratchpad file and references it in subsequent steps. Prevents critical information from being lost when context fills or a new session starts. Acts as external memory outside the context window.' },
    { domain:'D5', q:'What is stratified random sampling used for in AI output validation?', a:'Measuring error rates within high-confidence subsets to detect systematic failures masked by aggregate metrics. Example: 97% overall accuracy may hide 60% error on a specific document type. Validates consistency across document types, date ranges, or entity categories before automating at scale.' },
    { domain:'D5', q:'What is progressive summarisation risk in long agentic sessions?', a:'Each summarisation cycle loses nuance from the original — summaries of summaries compress information further, causing key constraints or findings to disappear. Mitigation: retain raw tool outputs for critical findings rather than summarising them; use scratchpad files to preserve exact values across context boundaries.' },
    { domain:'D5', q:'Why are sentiment-based escalation triggers unreliable in agent systems?', a:'Sentiment detection produces high false-positive rates — a user being detailed or emphatic is not the same as needing human intervention. Sentiment also varies by culture and communication style. Use explicit, observable criteria: "customer used the phrase \'I want to speak to a manager\'" or "policy exception requested".' },
    { domain:'D5', q:'What is the difference between an access failure and a valid empty result?', a:'Access failure: the system could not retrieve data (permissions, network error, invalid query) — requires error handling.\nValid empty result: the query succeeded but found nothing (no records match) — is a legitimate, complete response.\nConflating them causes false error reports or silent failures hiding real data access problems.' },
    { domain:'D5', q:'What is structured state persistence for crash recovery in long-running agents?', a:'Writing agent state (current task, completed steps, partial results, next action) to a persistent store at each checkpoint — allowing recovery after crash, timeout, or context overflow by reloading state and continuing from the last checkpoint rather than restarting from scratch.' },
    { domain:'D5', q:'What are field-level confidence scores used for in AI extraction outputs?', a:'Flagging specific fields that may be unreliable (rather than rejecting the entire extraction) — enabling granular routing: high-confidence fields proceed automatically, low-confidence fields are routed for human review. More efficient than record-level accept/reject.' },
    { domain:'D5', q:'How should conflicting statistics from multiple sources be handled in structured output?', a:'Include all values with source attribution: {"revenue": [{"value": "4.2B", "source": "annual_report_p12"}, {"value": "4.5B", "source": "press_release"}]}. Never silently pick one. Flag conflicts explicitly with a conflicts_detected field so downstream systems can route for human adjudication.' },
    { domain:'D5', q:'Why should publication dates be required fields in structured extraction outputs?', a:'Extracted information may be accurate as of the publication date but outdated by the time it is used. Without publication dates, consumers cannot assess staleness. Required date fields force the model to surface temporal context — enabling downstream filtering by recency and preventing stale data from being used as current fact.' },
    { domain:'D5', q:'What is source attribution mapping, and why does it matter for long-document extraction?', a:'Recording which specific passage (page, paragraph, section) each extracted fact came from — e.g. {"founding_year": {"value": 1998, "source": "doc_p3_para2"}}. Enables: human verification, downstream citation, and debugging of extraction errors. Without it, verifying a fact requires re-reading the entire document.' },
    { domain:'D5', q:'How does context window pressure affect model accuracy, and what mitigations exist?', a:'As context grows, models may underweight early instructions, omit detail in responses, or become inconsistent with earlier statements.\nMitigations: summarise completed work into compact state, evict raw tool outputs after extracting key facts, keep system prompts concise, use scratchpad files for persistence.' },
    { domain:'D5', q:'What is "hallucination by interpolation" in RAG systems?', a:'The model fills gaps between retrieved facts with plausible-sounding but fabricated content — especially when retrieved chunks are incomplete or disconnected. Mitigation: instruct the model to say "I don\'t have enough information" rather than inferring; require explicit source citations for every claim; validate outputs against the retrieved context.' },
    { domain:'D5', q:'When should an agent refuse to proceed rather than attempt a best-effort answer?', a:'When: required information is genuinely absent (not just hard to find), proceeding would require fabricating data, the action is irreversible and confidence is low, or the request falls outside the agent\'s authorised scope. Best-effort is appropriate for stylistic/format decisions; refusal is correct for factual/action domains with high stakes.' }
  ];
